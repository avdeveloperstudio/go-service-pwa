<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Go Service</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header class="app-header" style="display: flex; align-items: center; justify-content: flex-start; gap: 15px; padding: 15px 20px;">
        <button id="btn-menu" class="icon-btn"><i class="ph ph-list"></i></button>
        <h1 style="margin: 0; font-size: 1.3rem;">Go Service</h1>
    </header>

    <div id="sidebar-overlay" class="modal-overlay hidden" style="justify-content: flex-start; z-index: 2000;">
        <div id="sidebar" class="sidebar-menu">
            <div class="sidebar-header">
                <h2 id="sidebar-title">Меню</h2>
                <button id="btn-close-sidebar" class="icon-btn"><i class="ph ph-x"></i></button>
            </div>

            <ul id="sidebar-main-menu" class="sidebar-nav">
                <li id="nav-settings"><i class="ph ph-gear"></i> Настройки</li>
            </ul>

            <ul id="sidebar-settings-menu" class="sidebar-nav" style="display: none;">
                <li id="btn-sidebar-back" style="color: var(--text-muted);"><i class="ph ph-arrow-left"></i> Назад</li>
                <li id="setting-time-slots"><i class="ph ph-clock"></i> Слоты времени</li>
            </ul>

            <div id="sidebar-time-slots-view" style="display: none; flex: 1; overflow-y: auto; padding: 0 20px 20px;">
                <ul class="sidebar-nav" style="padding: 10px 0;">
                    <li id="btn-time-slots-back" style="color: var(--text-muted); padding: 0 0 15px 0;"><i class="ph ph-arrow-left"></i> Назад</li>
                </ul>
                <div id="time-slots-list" style="margin-bottom: 20px;">
                    </div>
                <button id="btn-add-time-slot" class="btn-primary"><i class="ph ph-plus"></i> Добавить слот</button>
            </div>
        </div>
    </div>

    <main id="app-content">

        <section id="tab-journal" class="tab-content active">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month"><i class="ph ph-caret-left"></i></button>
                    <h2 id="current-month-year">Март 2026</h2>
                    <button id="next-month"><i class="ph ph-caret-right"></i></button>
                </div>
                <div class="calendar-grid" id="calendar-days">
                    </div>
            </div>

            <div class="timeline-container">
                <h3 id="selected-date-title">Записи на сегодня</h3>
                <div id="daily-records" class="records-list">
                    <p class="empty-state">Загрузка данных...</p>
                </div>
            </div>
        </section>

        <section id="tab-clients" class="tab-content">
            <div class="timeline-container">
                <h3>Список клиентов</h3>
                <div id="clients-list" class="records-list">
                    <p class="empty-state">Загрузка данных...</p>
                </div>
            </div>
        </section>

        <section id="tab-stats" class="tab-content">
            <div class="stats-container">
                <h2>Статистика</h2>
                <div class="chart-card">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <button id="fab-add" class="fab"><i class="ph ph-plus"></i></button>

    <div id="modal-record" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">Новая запись</h3>
                <button id="btn-close-modal" class="icon-btn"><i class="ph ph-x"></i></button>
            </div>
            <form id="record-form" class="beauty-form">
                <div class="form-group">
                    <label>Клиент</label>
                    <div class="custom-select" id="client-select-container">
                        <div class="select-trigger" id="client-trigger">Выберите клиента...</div>
                        <div class="select-dropdown hidden" id="client-dropdown">
                            <input type="text" id="client-search" placeholder="Поиск по имени..." autocomplete="off">
                            <ul id="client-options" class="options-list"></ul>
                        </div>
                    </div>
                    <input type="hidden" id="input-client" required>
                </div>

                <div id="client-info-preview" class="client-preview hidden">
                    <span id="preview-phone"></span>
                    <span id="preview-inst"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" id="input-date" required>
                    </div>
                    <div class="form-group">
                        <label>Время</label>
                        <select id="input-time" required></select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="input-category" required>
                            <option value="" disabled selected>Выберите...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Услуга</label>
                        <select id="input-service" required>
                            <option value="" disabled selected>Сначала категория</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="input-status">
                            <option value="Активна" selected>Активна</option>
                            <option value="Исполнена">Исполнена</option>
                            <option value="Отмена">Отмена</option>
                            <option value="Перенос">Перенос</option>
                            <option value="Неявка">Неявка</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Цена (<span class="icon-byn"></span>)</label>
                        <input type="number" id="input-price" placeholder="0.00" step="0.1">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Сохранить</button>
            </form>
        </div>
    </div>

    <div id="modal-client" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Новый клиент</h3>
                <button id="btn-close-client-modal" class="icon-btn"><i class="ph ph-x"></i></button>
            </div>
            <form id="client-form" class="beauty-form">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="input-client-name" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label>Телефон/Адрес</label>
                    <input type="text" id="input-client-phone" placeholder="Введите телефон/адрес">
                </div>
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="input-client-inst" placeholder="Вставьте ссылку @instagram">
                </div>
                <button type="submit" class="btn-primary">Сохранить клиента</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="tab-journal">
            <i class="ph ph-calendar-blank"></i>
            <span>Записи</span>
        </button>

        <button class="nav-btn" data-target="tab-clients">
            <i class="ph ph-users"></i>
            <span>Клиенты</span>
        </button>

        <button class="nav-btn" data-target="tab-stats">
            <i class="ph ph-chart-line-up"></i>
            <span>Статистика</span>
        </button>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="module" src="js/main.js"></script>

        <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker успешно зарегистрирован:', registration.scope);

              // Проверяем обновления при каждом открытии страницы
              registration.update();
            })
            .catch(error => {
              console.log('Ошибка регистрации ServiceWorker:', error);
            });
        });
      }
    </script>

    </body>
</html>
